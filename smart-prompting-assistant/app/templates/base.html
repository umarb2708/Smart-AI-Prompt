<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart AI Prompting Assistant{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>Smart AI Prompting Assistant</h1>
        <nav>
            <ul>
                <li><a href="{{ url_for('main.index') }}">Home</a></li>
                <li><a href="{{ url_for('prompts.optimize') }}">Optimize Prompts</a></li>

            </ul>
        </nav>

    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>&copy; 2023 Smart AI Prompting Assistant</p>
    </footer>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
